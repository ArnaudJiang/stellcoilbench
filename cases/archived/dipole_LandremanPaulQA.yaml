# a0 = 10.10 (minor_radius = 0.1683 m)
description: "Dipole coil optimization for the Landreman-Paul 2021 QA surface: TF coils plus planar dipole array (4×4 grid, dipole_order=2), fixed shapes/currents/center/orientation, L-BFGS-B, 500 iterations."
surface_params:
  surface: "input.LandremanPaul2021_QA"

coils_params:
  coil_type: "dipole"
  dipole_order: 0
  fix_shapes: True
  fix_currents: False
  fix_center: True
  fix_orientation: True

optimizer_params:
  algorithm: "L-BFGS-B"
  max_iterations: 500

coil_objective_terms:
  cc_threshold: 1.515     # 0.15 * a0 (0.15 m device-scale)
  length_threshold: 202.0 # 20 * a0 (20 m device-scale)
