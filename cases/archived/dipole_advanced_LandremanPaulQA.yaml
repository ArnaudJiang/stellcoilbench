# a0 = 10.10 (minor_radius = 0.1683 m)
description: "Dipole coil optimization for the Landreman-Paul 2021 QA surface with Fourier continuation on TF coils: TF coils plus planar dipole array (6×6 grid, dipole_order=0), fixed shapes/currents/center/orientation, augmented Lagrangian, Fourier continuation from TF order 4 to 8."
surface_params:
  surface: "input.LandremanPaul2021_QA"

coils_params:
  coil_type: "dipole"
  dipole_order: 0
  vv_extension: 0.13
  fix_shapes: True
  fix_currents: False
  fix_center: True
  fix_orientation: True

fourier_continuation:
  enabled: true
  orders: [4, 8]

optimizer_params:
  algorithm: "L-BFGS-B"
  max_iterations: 1000

coil_objective_terms:
  cc_threshold: 1.515     # 0.15 * a0 (0.15 m device-scale)
  length_threshold: 202.0 # 20 * a0 (20 m device-scale)