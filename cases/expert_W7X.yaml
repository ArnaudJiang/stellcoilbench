# a0 = 3.24 (minor_radius = 0.5241 m)
description: "Modular coil optimization for W7-X without coil ripple using augmented Lagrangian: 4 coils, augmented Lagrangian with L-BFGS-B suboptimizer, Fourier continuation from order 4 to 16 (reactor-scale thresholds)."
surface_params:
  surface: "input.W7-X_without_coil_ripple_beta0p05_d23p4_tm"

coils_params:
  ncoils: 4

fourier_continuation:
  enabled: true
  orders: [4, 8, 16]

optimizer_params:
  algorithm: "augmented_lagrangian"
  max_iterations: 500
  max_iter_subopt: 20
  minimize_method: "L-BFGS-B"

coil_objective_terms:
  length_threshold: 145.8  # 45 * a0 (45 m device-scale)
  cc_threshold: 0.81      # 0.25 * a0 (0.25 m device-scale)
  cs_threshold: 1.13      # 0.35 * a0 (0.35 m device-scale)

