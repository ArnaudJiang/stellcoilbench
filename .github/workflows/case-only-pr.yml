# Case-only PR: validate, auto-approve, enable auto-merge
# Runs when PR touches cases/ or plasma_surfaces/. Validates case YAMLs and
# plasma surface files; if only those files changed and validation passes,
# approves and enables auto-merge.
name: Case-only PR

on:
  pull_request:
    branches: [main]
    paths:
      - "cases/**"
      - "plasma_surfaces/**"
      - ".github/CASE_ONLY_MAINTAINERS"
      - ".github/workflows/case-only-pr.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-and-automerge:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package
        run: pip install -e .

      - name: Get changed files
        id: changed
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || true)
          echo "changed<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Check maintainer bypass
        id: maintainer
        run: |
          BYPASS="false"
          if [ -f .github/CASE_ONLY_MAINTAINERS ]; then
            AUTHOR="${{ github.event.pull_request.user.login }}"
            while IFS= read -r line; do
              line=$(echo "$line" | sed 's/#.*//; s/^[[:space:]]*//; s/[[:space:]]*$//')
              [ -z "$line" ] && continue
              if [ "$line" = "$AUTHOR" ]; then
                BYPASS="true"
                break
              fi
            done < .github/CASE_ONLY_MAINTAINERS
          fi
          echo "bypass=$BYPASS" >> "$GITHUB_OUTPUT"

      - name: Validate case-only and case YAMLs
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.changed }}
          MAINTAINER_BYPASS: ${{ steps.maintainer.outputs.bypass }}
        run: python -m tools.ci_case_only_validate --ci

      - name: Auto-approve and enable auto-merge
        if: success() && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve
          gh pr merge ${{ github.event.pull_request.number }} --auto --squash
