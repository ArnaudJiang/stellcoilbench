# Case-only PR: validate, auto-approve, enable auto-merge
# Runs when PR touches cases/. Validates case YAMLs; if only case files
# changed and validation passes, approves and enables auto-merge.
name: Case-only PR

on:
  pull_request:
    branches: [main]
    paths:
      - "cases/**"
      - ".github/CASE_ONLY_MAINTAINERS"
      - ".github/workflows/case-only-pr.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-and-automerge:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package
        run: pip install -e .

      - name: Get changed files
        id: changed
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || true)
          echo "changed<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Check maintainer bypass
        id: maintainer
        run: |
          BYPASS="false"
          if [ -f .github/CASE_ONLY_MAINTAINERS ]; then
            AUTHOR="${{ github.event.pull_request.user.login }}"
            while IFS= read -r line; do
              line=$(echo "$line" | sed 's/#.*//; s/^[[:space:]]*//; s/[[:space:]]*$//')
              [ -z "$line" ] && continue
              if [ "$line" = "$AUTHOR" ]; then
                BYPASS="true"
                break
              fi
            done < .github/CASE_ONLY_MAINTAINERS
          fi
          echo "bypass=$BYPASS" >> "$GITHUB_OUTPUT"

      - name: Validate case-only and case YAMLs
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.changed }}
          MAINTAINER_BYPASS: ${{ steps.maintainer.outputs.bypass }}
        run: |
          set -e
          if [ -z "$CHANGED_FILES" ]; then
            echo "No changed files (possible merge conflict or empty diff)"
            exit 0
          fi

          NON_CASE=""
          CASE_YAMLS=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              cases/*.yaml)
                CASE_YAMLS="${CASE_YAMLS}${file}"$'\n'
                ;;
              cases/pending/*.yaml)
                CASE_YAMLS="${CASE_YAMLS}${file}"$'\n'
                ;;
              *)
                if [ "$MAINTAINER_BYPASS" != "true" ]; then
                  NON_CASE="${NON_CASE}${file}"$'\n'
                fi
                ;;
            esac
          done <<< "$CHANGED_FILES"

          if [ -n "$NON_CASE" ]; then
            echo "Not a case-only PR. Files outside cases/:"
            echo "$NON_CASE"
            echo "Skipping auto-merge."
            exit 0
          fi

          if [ -z "$CASE_YAMLS" ]; then
            echo "No case YAML files changed."
            exit 0
          fi

          python -c "
          import sys
          from pathlib import Path
          from stellcoilbench.validate_config import validate_case_yaml_file

          changed = sys.argv[1].strip().split('\n') if sys.argv[1] else []
          changed = [f for f in changed if f.endswith('.yaml') and Path(f).exists()]
          errors = []
          for f in changed:
              errs = validate_case_yaml_file(Path(f))
              if errs:
                  errors.extend(errs)
          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              sys.exit(1)
          print('All case files valid.')
          " "$CASE_YAMLS"

      - name: Auto-approve and enable auto-merge
        if: success() && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve
          gh pr merge ${{ github.event.pull_request.number }} --auto --squash
