# Composite action: Setup LFS SSH for git push (stellcoilbench-lfs).
# Run before git push that may include LFS content.
#
# Requires env: LFS_DEPLOY_KEY (from secrets)
# Optional env: DEPLOY_KEY (main repo key) — when both set, creates combined
# SSH config so core.sshCommand (from actions/checkout) is overridden and
# each host uses the correct key; fixes LFS push "Permission denied to deploy key".
#
# Usage:
#   - uses: ./.github/actions/ci-lfs-ssh
#     env:
#       LFS_DEPLOY_KEY: ${{ secrets.LFS_DEPLOY_KEY }}
#       DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}  # optional; pass for combined config
name: CI LFS SSH setup
description: Configure SSH for Git LFS push to stellcoilbench-lfs
runs:
  using: composite
  steps:
    - name: Setup LFS SSH
      shell: bash
      run: bash tools/ci_setup_lfs_ssh.sh
