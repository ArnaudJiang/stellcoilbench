# Composite action: Check out repo first (so local actions resolve), then install Git LFS.
# LFS SSH (for push) is configured by ci-lfs-ssh before commits.
#
# Checkout must run first: if it fails later, steps with if: failure() need local
# actions (e.g. ci-show-logs-on-failure) which live in the repo.
#
# Requires job env: CONDA_ROOT, CONDA_ENV
# Requires input: deploy_key for checkout (secrets.DEPLOY_KEY)
#
# Usage:
#   - uses: ./.github/actions/ci-job-setup
#     env:
#       LFS_DEPLOY_KEY: ${{ secrets.LFS_DEPLOY_KEY }}
#     with:
#       deploy_key: ${{ secrets.DEPLOY_KEY }}
name: CI job setup (checkout + LFS)
description: Check out repository, then install Git LFS
inputs:
  deploy_key:
    description: SSH deploy key for checkout (secrets.DEPLOY_KEY)
    required: true
  ref:
    description: Branch or ref to check out
    required: false
    default: main
runs:
  using: composite
  steps:
    - name: Check out repository
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.ref }}
        fetch-depth: 0
        lfs: false
        ssh-key: ${{ inputs.deploy_key }}

    - name: Install Git LFS
      shell: bash
      run: |
        curl -sSL "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/tools/ci_install_git_lfs.sh" | bash
