# Composite action: Install Git LFS.
# Requires: actions/checkout run first (workflow step before this action).
# LFS SSH (for push) is configured by ci-lfs-ssh before commits.
#
# Requires job env: CONDA_ROOT, CONDA_ENV
#
# Usage:
#   - uses: actions/checkout@v4
#     with:
#       ref: main
#       fetch-depth: 0
#       lfs: false
#       ssh-key: ${{ secrets.DEPLOY_KEY }}
#   - uses: ./.github/actions/ci-job-setup
name: CI job setup (LFS install)
description: Install Git LFS (checkout must run first in workflow)
runs:
  using: composite
  steps:
    - name: Install Git LFS
      shell: bash
      run: |
        curl -sSL "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/tools/ci_install_git_lfs.sh" | bash
