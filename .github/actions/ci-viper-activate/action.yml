# Composite action: load Viper modules (intel, impi, python-waterboa), activate venv, run script.
# Replaces ~6 lines of module-sourcing boilerplate repeated across the Viper workflow.
#
# Usage:
#   - uses: ./.github/actions/ci-viper-activate
#     with:
#       run: |
#         pip install -e .
#         python tools/ci_filter_cases.py --cases-dir cases --github-output
#
# Environment: Viper (MPCDF) HPC login/compute nodes
name: Viper activate
description: Load Viper modules and activate stellcoilbench-env
inputs:
  run:
    description: Bash script to run after activation (required)
    required: true
runs:
  using: composite
  steps:
    - name: Activate Viper env and run
      shell: bash
      run: |
        source /etc/profile.d/modules.sh 2>/dev/null || true
        if ! command -v module &>/dev/null; then
          echo "::error::Environment Modules not loaded. The 'module' command is not available."
          echo "Ensure the self-hosted runner is started in an environment where module is in PATH (e.g. run 'source /etc/profile.d/modules.sh' in the runner's shell profile or start the runner from an interactive login session that has already loaded modules)."
          exit 1
        fi
        module purge
        module load intel/2024.0 impi/2021.11
        export LD_LIBRARY_PATH=$I_MPI_ROOT/lib/release:$LD_LIBRARY_PATH
        module load python-waterboa/2025.06
        source $HOME/stellcoilbench-env/bin/activate
        ${{ inputs.run }}
